<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BankDash - Services</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container-fluid p-0">
        <div class="row g-0">
            <!-- Sidebar -->
            <div class="col-auto">
                <aside class="sidebar p-4">
                    <div class="logo d-flex align-items-center gap-2 mb-5 ms-3">
                        <img src="img/logo.png" alt="BankDash">
                        <span>BankDash.</span>
                    </div>
                    <nav>
                        <ul class="nav flex-column w-100 gap-1">
                            <li class="nav-item w-100 active">
                                <a href="dashboard.html" class="nav-link active">
                                    <img src="img/dashboard.png" class="nav-icon">
                                    <span>Dashboard</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="transaction.html" class="nav-link">
                                    <img src="img/transaction.png" class="nav-icon">
                                    <span>Transactions</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="account.html" class="nav-link">
                                    <img src="img/account.png" class="nav-icon">
                                    <span>Accounts</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="investment.html" class="nav-link">
                                    <img src="img/investment.png" class="nav-icon">
                                    <span>Investments</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="index.html" class="nav-link">
                                    <img src="img/credit-card.png" class="nav-icon">
                                    <span>Credit Cards</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="loan.html" class="nav-link">
                                    <img src="img/loan.png" class="nav-icon">
                                    <span>Loans</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="service.html" class="nav-link">
                                    <img src="img/service.png" class="nav-icon">
                                    <span>Services</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="privilege.html" class="nav-link">
                                    <img src="img/privilege.png" class="nav-icon">
                                    <span>My Privileges</span>
                                </a>
                            </li>
                            <li class="nav-item w-100">
                                <a href="setting.html" class="nav-link">
                                    <img src="img/setting.png" class="nav-icon">
                                    <span>Setting</span>
                                </a>
                            </li>
                        </ul>
                    </nav>
                </aside>
            </div>

            <!-- Main Content -->
            <div class="col">
                <main class="main-content">
                    <!-- Topbar -->
                    <header class="topbar">
                        <div class="d-flex align-items-center justify-content-between w-100">
                            <div class="mobile-menu">
                                <i class="fas fa-bars"></i>
                            </div>
                            <h2 class="page-title">Dashboard</h2>
                            <div class="d-flex align-items-center gap-3">
                                <div class="search-box desktop-search">
                                    <img src="img/search.png" class="search-icon">
                                    <input type="text" class="search-input" placeholder="Search for something">
                                </div>
                                <div class="topbar-icon">
                                    <img src="img/settings.png">
                                </div>
                                <div class="topbar-icon bell">
                                    <img src="img/notification.png">
                                </div>
                                <img src="img/profile.png" class="profile-img">
                            </div>
                        </div>
                        <div class="mobile-search-row">
                            <div class="search-box">
                                <img src="img/search.png" class="search-icon">
                                <input type="text" class="search-input" placeholder="Search for something">
                            </div>
                        </div>
                    </header>

                    <div class="content-body">
                        <div class="content-body d-flex justify-content-center align-items-center" style="height:70vh;">
                            <h4>This is Dashboard Page</h4>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="js/app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
